<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
		<meta name="robots" content="noindex, nofollow">
		
		<title>тест</title>

		<style>
			html, body {
				background-color:#FFF0D3;
			}
			
			body {
				width:100%;
				min-width:100%;
				max-width:100%;
				min-height:100vh;
				margin: 0 auto;
				padding:0 0 120px 0;
				background: radial-gradient(circle at 20% 20%, rgba(255, 235, 200, 0.6), transparent 40%), 
				radial-gradient(circle at 80% 40%, rgba(240, 220, 180, 0.5), transparent 35%), 
				radial-gradient(circle at 40% 80%, rgba(250, 230, 190, 0.4), transparent 30%), 
				#f4e2b8; /* базовый песочный цвет */
				background-blend-mode: multiply; filter: contrast(105%) brightness(102%);
			}

			.content {
				width:84%;
				min-width:84%;
				max-width:84%;
				margin:0 auto; 
				padding:10px;
				color:#261304;
				position:relative;
				hyphens: auto;
			}
			 
			h1 {
				margin:20px;
				text-align:center;
				font-size:40px;
				transition: 0.6s;
			}
			 
			@media (max-width: 900px) {
				h1 {
					font-size: 32px;
				}
			}
			
			@media (max-width: 700px) {
				h1 {
					font-size: 26px;
				}
			}
			 
			@media (max-width: 300px) {
				h1 {
					font-size: 20px;
				}
			}
			
			@media (max-width: 260px) {
				h1 {
					font-size: 16px;
				}
			}
			
			 


		</style>
		
		
	
		
		
		
	</head>
	<body>
	
	


		<div class="content">
			<H1>ТЕСТОВАЯ СТРАНИЦА</H1>	
		</div>
		









	</body>
</html>
